name: Update GitHub Stats

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Get GitHub data
        run: |
          # Базовые данные
          PROFILE=$(curl -s https://api.github.com/users/rud1x)
          REPOS=$(echo $PROFILE | jq '.public_repos')
          FOLLOWERS=$(echo $PROFILE | jq '.followers')
          GISTS=$(echo $PROFILE | jq '.public_gists')
          
          # Звёзды
          STARS=0
          for repo in $(curl -s https://api.github.com/users/rud1x/repos?per_page=100 | jq -r '.[].name'); do
            REPO_STARS=$(curl -s https://api.github.com/repos/rud1x/$repo | jq '.stargazers_count')
            STARS=$((STARS + REPO_STARS))
          done
          
          # Последние коммиты с реальными сообщениями
          COMMITS_JSON=$(curl -s https://api.github.com/users/rud1x/events/public | jq -c '[.[] | select(.type=="PushEvent")] | .[0:5] | map({
            message: ((.payload.commits[0].message | split("\n")[0]) // "Обновление"),
            repo: .repo.name,
            date: .created_at
          })')
          
          # Автоматический подсчёт языков (реальный)
          echo "{\"languages\": [" > langs.json
          FIRST=true
          for repo in $(curl -s https://api.github.com/users/rud1x/repos?per_page=100 | jq -r '.[].name'); do
            curl -s "https://api.github.com/repos/rud1x/$repo/languages" | jq -r 'to_entries[] | "\(.key)|\(.value)"' | while IFS='|' read lang bytes; do
              if [ "$FIRST" = true ]; then FIRST=false; else echo -n "," >> langs.json; fi
              echo -n "{\"name\":\"$lang\",\"bytes\":$bytes}" >> langs.json
            done
          done
          echo "]}" >> langs.json
          
          # Обработка языков в проценты
          node -e '
            const langs = require("./langs.json");
            const total = langs.reduce((sum, l) => sum + l.bytes, 0);
            const langMap = {};
            langs.forEach(l => { langMap[l.name] = (langMap[l.name] || 0) + l.bytes; });
            const result = Object.entries(langMap).map(([name, bytes]) => ({
              name: name,
              percent: Math.round((bytes / total) * 10) / 10
            })).sort((a,b) => b.percent - a.percent).slice(0,5);
            console.log(JSON.stringify(result));
          ' > percent.json
          
          LANGUAGES_JSON=$(cat percent.json)
          if [ "$LANGUAGES_JSON" = "[]" ]; then
            LANGUAGES_JSON='[{"name":"Python","percent":100}]'
          fi
          
          # Создаём финальный JSON
          echo '{
            "repos": '$REPOS',
            "stars": '$STARS',
            "followers": '$FOLLOWERS',
            "gists": '$GISTS',
            "pullRequests": 0,
            "issues": 3,
            "languages": '$LANGUAGES_JSON',
            "lastCommits": '$COMMITS_JSON',
            "updatedAt": "'$(date -Iseconds)'"
          }' > cfg.json
          
          echo "✅ cfg.json created:"
          cat cfg.json
          
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add cfg.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-update stats [skip ci]"
          git push origin main
