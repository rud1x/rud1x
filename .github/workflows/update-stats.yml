name: Update cfg.json Stats

on:
  schedule:
    - cron: '0 */1 * * *'   # Каждый час
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cfg:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install jq
        run: sudo apt-get install -y jq
      
      - name: Get GitHub data
        run: |
          echo "🕐 Получаем данные..."
          
          PROFILE=$(curl -s https://api.github.com/users/rud1x)
          REPOS=$(echo $PROFILE | jq '.public_repos')
          FOLLOWERS=$(echo $PROFILE | jq '.followers')
          GISTS=$(echo $PROFILE | jq '.public_gists')
          
          # Считаем звёзды
          STARS=0
          for repo in $(curl -s https://api.github.com/users/rud1x/repos?per_page=100 | jq -r '.[].name'); do
            REPO_STARS=$(curl -s https://api.github.com/repos/rud1x/$repo | jq '.stargazers_count')
            STARS=$((STARS + REPO_STARS))
          done
          
          # Получаем коммиты
          COMMITS_JSON=$(curl -s https://api.github.com/users/rud1x/events/public | jq -c '[.[] | select(.type=="PushEvent")] | .[0:5] | map({
            message: (.payload.commits[0].message // "Commit"),
            repo: .repo.name,
            date: .created_at
          })')
          TOTAL_COMMITS=$(echo $COMMITS_JSON | jq 'length')
          
          # Создаём cfg.json
          cat > cfg.json << EOF
{
  "repos": $REPOS,
  "stars": $STARS,
  "followers": $FOLLOWERS,
  "gists": $GISTS,
  "totalCommits": $TOTAL_COMMITS,
  "pullRequests": 0,
  "issues": 3,
  "lastCommits": $COMMITS_JSON,
  "updatedAt": "$(date -Iseconds)"
}
EOF
          
          echo "✅ cfg.json создан:"
          cat cfg.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add cfg.json
          
          if git diff --cached --quiet; then
            echo "ℹ️ Нет изменений для коммита"
            exit 0
          fi
          
          git commit -m "Update cfg.json [$(date +%H:%M:%S)]"
          git push origin main
          
          echo "✅ cfg.json обновлён!"
