name: Update cfg.json Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cfg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get GitHub data
        run: |
          curl -s https://api.github.com/users/rud1x > profile.json
          REPOS=$(grep -o '"public_repos":[0-9]*' profile.json | grep -o '[0-9]*')
          FOLLOWERS=$(grep -o '"followers":[0-9]*' profile.json | grep -o '[0-9]*')
          
          echo "repos=$REPOS"
          echo "followers=$FOLLOWERS"
          
          NOW=$(date -Iseconds)
          
          echo '{' > cfg.json
          echo '  "repos": '$REPOS',' >> cfg.json
          echo '  "stars": 13,' >> cfg.json
          echo '  "followers": '$FOLLOWERS',' >> cfg.json
          echo '  "gists": 0,' >> cfg.json
          echo '  "totalCommits": 0,' >> cfg.json
          echo '  "pullRequests": 0,' >> cfg.json
          echo '  "issues": 3,' >> cfg.json
          echo '  "lastCommits": [],' >> cfg.json
          echo '  "updatedAt": "'$NOW'"' >> cfg.json
          echo '}' >> cfg.json
          
          cat cfg.json
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cfg.json
          git commit -m "Update cfg.json" || echo "No changes"
          git push
