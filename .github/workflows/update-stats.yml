name: Update cfg.json Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cfg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update cfg.json
        run: |
          echo "Getting GitHub data..."
          
          PROFILE=$(curl -s https://api.github.com/users/rud1x)
          REPOS=$(echo $PROFILE | grep -o '"public_repos":[0-9]*' | grep -o '[0-9]*')
          FOLLOWERS=$(echo $PROFILE | grep -o '"followers":[0-9]*' | grep -o '[0-9]*')
          
          echo "Calculating stars..."
          STARS=0
          for repo in $(curl -s https://api.github.com/users/rud1x/repos?per_page=100 | grep -o '"name":"[^"]*"' | cut -d'"' -f4); do
            if [ -n "$repo" ]; then
              REPO_STARS=$(curl -s https://api.github.com/repos/rud1x/$repo | grep -o '"stargazers_count":[0-9]*' | grep -o '[0-9]*')
              STARS=$((STARS + REPO_STARS))
            fi
          done
          echo "Total stars: $STARS"
          
          NOW=$(date -Iseconds)
          
          cat > cfg.json << EOF
{
  "repos": $REPOS,
  "stars": $STARS,
  "followers": $FOLLOWERS,
  "gists": 0,
  "totalCommits": 0,
  "pullRequests": 0,
  "issues": 3,
  "lastCommits": [],
  "updatedAt": "$NOW"
}
EOF
          
          echo "cfg.json created:"
          cat cfg.json
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add cfg.json
          
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "Auto-update cfg.json"
          git push
          
          echo "Done!"
