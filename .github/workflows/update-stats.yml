name: Update cfg.json Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cfg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get GitHub data
        run: |
          curl -s https://api.github.com/users/rud1x > profile.json
          
          REPOS=$(cat profile.json | jq '.public_repos')
          FOLLOWERS=$(cat profile.json | jq '.followers')
          GISTS=$(cat profile.json | jq '.public_gists')
          
          echo "repos=$REPOS"
          echo "followers=$FOLLOWERS"
          
          NOW=$(date -Iseconds)
          
          cat > cfg.json << EOF
{
  "repos": $REPOS,
  "stars": 13,
  "followers": $FOLLOWERS,
  "gists": $GISTS,
  "totalCommits": 0,
  "pullRequests": 0,
  "issues": 3,
  "lastCommits": [],
  "updatedAt": "$NOW"
}
EOF
          
          cat cfg.json
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git pull origin main --rebase || true
          git add cfg.json
          git commit -m "Update cfg.json" || echo "No changes"
          git push origin main
