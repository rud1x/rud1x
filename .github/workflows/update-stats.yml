name: Update GitHub Stats

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Get GitHub data
        run: |
          PROFILE=$(curl -s https://api.github.com/users/rud1x)
          REPOS=$(echo $PROFILE | jq '.public_repos')
          FOLLOWERS=$(echo $PROFILE | jq '.followers')
          
          # Считаем звёзды
          STARS=0
          for repo in $(curl -s https://api.github.com/users/rud1x/repos?per_page=100 | jq -r '.[].name'); do
            REPO_STARS=$(curl -s https://api.github.com/repos/rud1x/$repo | jq '.stargazers_count')
            STARS=$((STARS + REPO_STARS))
          done
          
          # Считаем общее количество коммитов
          TOTAL_COMMITS=$(curl -s https://api.github.com/users/rud1x/events/public | jq '[.[] | select(.type=="PushEvent")] | length')
          
          jq -n \
            --argjson repos "$REPOS" \
            --argjson stars "$STARS" \
            --argjson followers "$FOLLOWERS" \
            --argjson totalCommits "$TOTAL_COMMITS" \
            --argjson pullRequests 0 \
            --argjson issues 3 \
            --arg updatedAt "$(date -Iseconds)" \
            '{
              repos: $repos,
              stars: $stars,
              followers: $followers,
              totalCommits: $totalCommits,
              pullRequests: $pullRequests,
              issues: $issues,
              updatedAt: $updatedAt
            }' > cfg.json

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add cfg.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Auto-update stats [skip ci]"
          git push origin main
