name: Update cfg.json Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cfg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Detailed GitHub Data
        run: |
          # 1. Общие данные профиля (репозитории, фолловеры)
          USER_DATA=$(curl -s https://api.github.com/users/rud1x)
          REPOS=$(echo $USER_DATA | jq '.public_repos')
          FOLLOWERS=$(echo $USER_DATA | jq '.followers')
          GISTS=$(echo $USER_DATA | jq '.public_gists')

          # 2. Суммарные звезды (по всем репозиториям)
          STARS=$(curl -s "https://api.github.com/users/rud1x/repos?per_page=100" | jq '[.[].stargazers_count] | add')

          # 3. Всего коммитов (во всех публичных репозиториях)
          COMMITS=$(curl -s "https://api.github.com/search/commits?q=author:rud1x" -H "Accept: application/vnd.github.cloak-preview" | jq '.total_count')

          # 4. Pull Requests
          PRS=$(curl -s "https://api.github.com/search/issues?q=author:rud1x+type:pr" | jq '.total_count')

          # 5. Issues (созданные тобой)
          ISSUES=$(curl -s "https://api.github.com/search/issues?q=author:rud1x+type:issue" | jq '.total_count')

          NOW=$(date -Iseconds)

          # Собираем всё в cfg.json
          jq -n \
            --arg repos "$REPOS" \
            --arg stars "$STARS" \
            --arg followers "$FOLLOWERS" \
            --arg gists "$GISTS" \
            --arg commits "$COMMITS" \
            --arg prs "$PRS" \
            --arg issues "$ISSUES" \
            --arg updated "$NOW" \
            '{
              repos: ($repos | tonumber),
              stars: ($stars | tonumber // 0),
              followers: ($followers | tonumber),
              gists: ($gists | tonumber),
              totalCommits: ($commits | tonumber // 0),
              pullRequests: ($prs | tonumber // 0),
              issues: ($issues | tonumber // 0),
              lastCommits: [],
              updatedAt: $updated
            }' > cfg.json

          cat cfg.json

      - name: Commit and push
        run: |
          git config user.name "rud1x"
          git config user.email "127332134+rud1x@users.noreply.github.com"
          
          if git diff --quiet cfg.json; then
            echo "No changes"
          else
            git add cfg.json
            git commit -m "style: update dashboard stats"
            git push origin main
          fi