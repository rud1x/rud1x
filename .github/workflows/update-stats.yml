name: Update GitHub Stats

on:
  schedule:
    # Запуск на 17 и 47 минуте, чтобы не стоять в очереди в ровные полчаса
    - cron: '17,47 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get GitHub data
        run: |
          # Используем встроенный токен GITHUB_TOKEN для обхода лимитов API
          AUTH_HEADER="Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"
          
          # 1. Получаем профиль
          PROFILE=$(curl -s -H "$AUTH_HEADER" https://api.github.com/users/rud1x)
          REPOS=$(echo "$PROFILE" | jq '.public_repos')
          FOLLOWERS=$(echo "$PROFILE" | jq '.followers')
          
          # 2. Считаем ВСЕ звёзды ОДНИМ запросом (без цикла по каждому репозиторию)
          STARS=$(curl -s -H "$AUTH_HEADER" "https://api.github.com/users/rud1x/repos?per_page=100" | jq '[.[].stargazers_count] | add')
          
          # 3. Считаем публичные коммиты (последние события)
          TOTAL_COMMITS=$(curl -s -H "$AUTH_HEADER" https://api.github.com/users/rud1x/events/public | jq '[.[] | select(.type=="PushEvent")] | length')
          
          # Записываем в JSON
          jq -n \
            --argjson repos "$REPOS" \
            --argjson stars "$STARS" \
            --argjson followers "$FOLLOWERS" \
            --argjson totalCommits "$TOTAL_COMMITS" \
            --argjson pullRequests 0 \
            --argjson issues 3 \
            --arg updatedAt "$(date -Iseconds)" \
            '{
              repos: $repos,
              stars: $stars,
              followers: $followers,
              totalCommits: $totalCommits,
              pullRequests: $pullRequests,
              issues: $issues,
              updatedAt: $updatedAt
            }' > cfg.json

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cfg.json
          
          # Проверяем изменения. Если их нет — воркфлоу завершится успешно
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update stats"
            git push origin main
          fi
