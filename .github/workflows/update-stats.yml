name: Update cfg.json Stats

on:
  schedule:
    - cron: '0 * * * *' # Раз в час
  workflow_dispatch: # Возможность запуска вручную

permissions:
  contents: write

jobs:
  update-cfg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch GitHub Data
        run: |
          # Получаем основной профиль
          USER_DATA=$(curl -s https://api.github.com/users/rud1x)
          
          REPOS=$(echo $USER_DATA | jq '.public_repos')
          FOLLOWERS=$(echo $USER_DATA | jq '.followers')
          GISTS=$(echo $USER_DATA | jq '.public_gists')
          
          # Считаем суммарное количество звезд во всех репозиториях
          STARS=$(curl -s "https://api.github.com/users/rud1x/repos?per_page=100" | jq '[.[].stargazers_count] | add')
          
          NOW=$(date -Iseconds)

          # Собираем JSON красиво и безопасно через jq
          jq -n \
            --arg repos "$REPOS" \
            --arg stars "$STARS" \
            --arg followers "$FOLLOWERS" \
            --arg gists "$GISTS" \
            --arg updated "$NOW" \
            '{
              repos: ($repos | tonumber),
              stars: ($stars | tonumber // 0),
              followers: ($followers | tonumber),
              gists: ($gists | tonumber),
              totalCommits: 0,
              pullRequests: 0,
              issues: 0,
              lastCommits: [],
              updatedAt: $updated
            }' > cfg.json

          cat cfg.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Проверяем, есть ли изменения в файле, чтобы не делать пустых коммитов
          if git diff --quiet cfg.json; then
            echo "No changes detected"
          else
            git add cfg.json
            git commit -m "chore: update stats in cfg.json"
            git push origin main
          fi
